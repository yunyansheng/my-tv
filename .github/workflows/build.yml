name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 拉取完整 git 历史

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify Java version
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Set Gradle Java home in gradle.properties
        run: |
          # 确保文件末尾有换行，再追加属性
          echo "" >> gradle.properties
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
          echo "=== gradle.properties content ==="
          cat gradle.properties

      - name: Ensure git tags exist
        run: |
          if ! git describe --tags >/dev/null 2>&1; then
            echo "No tags found, creating v0.0.0"
            git tag v0.0.0
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK (clean daemon cache)
        run: |
          ./gradlew --stop 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
